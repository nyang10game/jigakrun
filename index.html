<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>지각런</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');

:root {
  --sky-morning: #b8cfe8;
  --sky-dark: #1a0033;
  --ground: #5a5a5a;
  --ground-line: #4a9a4a;
  --accent: #ff2d55;
  --purple: #7c3aed;
  --neon: #00f5ff;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; touch-action:none; }

html, body {
  width:100%; height:100%;
  overflow:hidden;
  background:#000;
  font-family:'Noto Sans KR', sans-serif;
  user-select:none; -webkit-user-select:none;
  position:fixed;
}

#gameWrapper {
  position:fixed;
  top:0; left:0;
  width:100%;
  height:100%;
  width:100dvw;
  height:100dvh;
  border:none; outline:none;
  overflow:hidden;
}

canvas {
  display:block;
  width:100%; height:100%;
  border:none; outline:none;
}

#ui {
  position:absolute; top:0; left:0;
  width:100%; height:100%;
  pointer-events:none;
}

/* HUD */
#hud {
  position:absolute; top:0; left:0; right:0;
  display:flex; justify-content:space-between; align-items:flex-start;
  padding:10px 14px;
}

#scoreBox {
  background:rgba(0,0,0,0.6);
  border-radius:10px; padding:6px 13px;
  color:#fff; font-weight:700;
  font-size:clamp(11px,2.8vw,16px); line-height:1.8;
  border:1px solid rgba(255,255,255,0.15);
  backdrop-filter:blur(8px);
}

#gaugeBox {
  background:rgba(0,0,0,0.6);
  border-radius:10px; padding:6px 13px;
  color:#fff; font-weight:700; text-align:center;
  font-size:clamp(10px,2.2vw,13px);
  border:1px solid rgba(255,255,255,0.15);
  backdrop-filter:blur(8px);
  min-width:clamp(120px,22vw,180px);
}

#gaugeBar {
  width:100%; height:10px;
  background:rgba(255,255,255,0.15);
  border-radius:5px; margin-top:4px; overflow:hidden;
}

#gaugeFill {
  height:100%; width:0%;
  background:linear-gradient(90deg,#7c3aed,#ff2d55);
  border-radius:5px;
  box-shadow:0 0 8px #ff2d55;
  transition:width 0.1s;
}

#shieldHUD {
  position:absolute; top:10px; right:14px;
  background:rgba(0,180,255,0.25);
  border:2px solid #00bfff; border-radius:8px;
  padding:4px 10px; color:#00bfff;
  font-size:clamp(11px,2.2vw,14px); font-weight:900;
  display:none; backdrop-filter:blur(4px);
}

/* 각성 오버레이 */
#awakeOverlay {
  position:absolute; inset:0;
  pointer-events:none; opacity:0;
  transition:opacity 0.3s;
  box-shadow:inset 0 0 100px rgba(124,58,237,0.85);
}
#awakeOverlay.on { opacity:1; animation:pulseAura 0.5s infinite alternate; }
@keyframes pulseAura {
  from { box-shadow:inset 0 0 100px rgba(124,58,237,0.85); }
  to   { box-shadow:inset 0 0 150px rgba(255,45,85,0.9); }
}

#awakeText {
  position:absolute; top:38%; left:50%;
  transform:translate(-50%,-50%) scale(0);
  color:#fff; font-weight:900; opacity:0;
  font-size:clamp(20px,5.5vw,42px);
  text-shadow:0 0 20px #ff2d55, 0 0 50px #7c3aed;
  pointer-events:none; white-space:nowrap; z-index:10;
}
#awakeText.pop { animation:popIn 0.6s forwards; }
@keyframes popIn {
  0%   { transform:translate(-50%,-50%) scale(0); opacity:0; }
  55%  { transform:translate(-50%,-50%) scale(1.25); opacity:1; }
  75%  { transform:translate(-50%,-50%) scale(0.92); opacity:1; }
  100% { transform:translate(-50%,-50%) scale(1); opacity:1; }
}

#awakeBar {
  position:absolute; bottom:0; left:0;
  height:5px; width:100%;
  background:linear-gradient(90deg,#7c3aed,#ff2d55);
  transform-origin:left; display:none;
}

/* 튜토리얼 힌트 */
#hint {
  position:absolute; bottom:clamp(55px,13vh,85px); left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.75); border:2px solid rgba(255,255,255,0.3);
  border-radius:50px; padding:10px 26px;
  color:#fff; font-size:clamp(13px,3vw,18px); font-weight:700;
  pointer-events:none; white-space:nowrap; display:none;
  animation:blink 0.85s infinite alternate;
}
@keyframes blink { from{opacity:1} to{opacity:0.2} }

/* 시작/게임오버 화면 */
#startScreen, #gameOverScreen {
  position:absolute; inset:0;
  display:flex; flex-direction:column;
  justify-content:center; align-items:center;
  background:rgba(0,0,0,0.82); color:#fff;
  backdrop-filter:blur(10px); pointer-events:all;
}

#startScreen h1 {
  font-size:clamp(40px,10vw,72px); font-weight:900;
  background:linear-gradient(135deg,#fff 0%,#ff2d55 45%,#7c3aed 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  letter-spacing:-2px; margin-bottom:4px;
}
#startScreen .sub {
  font-size:clamp(11px,2.5vw,15px);
  color:rgba(255,255,255,0.5); margin-bottom:18px;
}

#controlGuide {
  display:flex; gap:10px; margin-bottom:22px;
}
.ctrl {
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.18);
  border-radius:12px; padding:10px 14px; text-align:center;
  min-width:clamp(75px,14vw,110px);
}
.ctrl .icon { font-size:clamp(18px,4vw,26px); margin-bottom:3px; }
.ctrl .label { font-size:clamp(10px,1.8vw,12px); color:rgba(255,255,255,0.55); }

.btn {
  background:linear-gradient(135deg,#7c3aed,#ff2d55);
  border:none; border-radius:50px; color:#fff;
  font-size:clamp(15px,3.5vw,22px); font-weight:900;
  font-family:'Noto Sans KR',sans-serif;
  padding:clamp(12px,2.5vw,18px) clamp(32px,8vw,60px);
  cursor:pointer; min-height:52px;
  box-shadow:0 4px 28px rgba(124,58,237,0.55);
  pointer-events:all; transition:transform 0.1s;
}
.btn:active { transform:scale(0.95); }

#gameOverScreen h2 {
  font-size:clamp(28px,7vw,50px); font-weight:900;
  color:#ff2d55; margin-bottom:8px;
  text-shadow:0 0 24px rgba(255,45,85,0.7);
}
#gameOverScreen .stats {
  font-size:clamp(12px,2.5vw,16px);
  color:rgba(255,255,255,0.65);
  margin-bottom:22px; text-align:center; line-height:2.2;
}
#gameOverScreen .stats span { color:#fff; font-weight:700; }

/* 세로모드 */
#rotateMsg {
  display:none; position:fixed; inset:0;
  background:#0d0d1a; color:#fff;
  flex-direction:column; justify-content:center; align-items:center;
  font-size:clamp(15px,4vw,20px); font-weight:700; gap:16px; z-index:999;
}
#rotateMsg .rIcon { font-size:clamp(40px,10vw,60px); animation:rot 1.2s infinite alternate; }
@keyframes rot { from{transform:rotate(0deg)} to{transform:rotate(90deg)} }

@media (orientation:portrait) {
  #rotateMsg { display:flex; }
  #gameWrapper { display:none; }
}
</style>
</head>
<body>

<div id="rotateMsg">
  <div class="rIcon">📱</div>
  <div>핸드폰을 가로로 돌려주세요!</div>
</div>

<div id="gameWrapper">
  <canvas id="gc"></canvas>
  <div id="ui">
    <div id="awakeOverlay"></div>
    <div id="awakeBar"></div>

    <div id="hud">
      <div id="scoreBox">
        🏃 <span id="distD">0</span>m<br>
        🏆 <span id="bestD">0</span>m
      </div>
      <div id="gaugeBox">
        ⚡ 중2병 각성
        <div id="gaugeBar"><div id="gaugeFill"></div></div>
      </div>
    </div>

    <div id="shieldHUD">🛡️ 보호막</div>
    <div id="awakeText">😤 중2병 각성!!</div>
    <div id="hint">👆 화면 탭 = 점프!</div>

    <div id="startScreen">
      <h1>지각런</h1>
      <p class="sub">아 씨, 왜 뛰어야 돼...</p>
      <div id="controlGuide">
        <div class="ctrl"><div class="icon">👆</div><div class="label">탭 = 점프</div></div>
        <div class="ctrl"><div class="icon">✊</div><div class="label">꾹 = 높이점프</div></div>
        <div class="ctrl"><div class="icon">🛡️</div><div class="label">방패 먹기</div></div>
      </div>
      <button class="btn" id="startBtn">억지로 달리기</button>
    </div>

    <div id="gameOverScreen" style="display:none">
      <h2>지각했다 💀</h2>
      <div class="stats">
        거리 <span id="fDist">0</span>m &nbsp;|&nbsp; 최고 <span id="fBest">0</span>m<br>
        각성 <span id="fAwake">0</span>회
      </div>
      <button class="btn" id="restartBtn">또 달리기...</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════
//  캔버스 & 리사이즈
// ═══════════════════════════════════════
const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');
let W, H, GY; // GY = ground Y

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  GY = Math.round(H * 0.78);
}
resize();
window.addEventListener('resize', resize);

// ═══════════════════════════════════════
//  상수 (비율 기반)
// ═══════════════════════════════════════
const PW  = () => Math.round(W * 0.062); // player width
const PH  = () => Math.round(H * 0.20);  // player height
const GRAVITY    = 0.6;
const JUMP_V     = () => -(H * 0.042);
const LONGJUMP_V = () => -(H * 0.054);
const AWAKE_DUR  = 5;

// ═══════════════════════════════════════
//  게임 상태
// ═══════════════════════════════════════
let gState = 'start';
let score=0, best=0, elapsed=0, awakeCnt=0;
let gauge=0, isAwake=false, awakeT=0;
let shield=false, shieldFlash=0, mult=1;
let px, py, pvy, pJumps, onGround;
let obstacles=[], obsTimer=0, obsNext=2.5;
let powerups=[], puTimer=0, puNext=12;
let particles=[];
let bgScroll=0, shake=0;
let lastTs=null;
let pressT=0, pressing=false;

// 배경 오브젝트 (구간별)
let bgObjects=[];
// 구름
let clouds=[];

// ─── 속도 곡선 ───
function spd(t) {
  if(t<40) return 1.0 + t*0.012;
  if(t<70) return 1.48 + (t-40)*0.022;
  return Math.min(2.14 + Math.pow(1.022, t-70)*0.55, 9);
}

// ─── 초기화 ───
function initBg() {
  clouds = [];
  for(let i=0;i<5;i++) clouds.push({x:W*(0.1+i*0.2), y:H*(0.06+Math.random()*0.12), s:0.7+Math.random()*0.7});

  bgObjects = [];
  // 골목 빌라들
  let bx=0;
  while(bx < W*3) {
    const seg = Math.floor(bx / W) % 3; // 0:골목 1:상가 2:학교앞
    const bw = W*(0.055+Math.random()*0.07);
    const bh = H*(0.18+Math.random()*0.28);
    bgObjects.push({x:bx, w:bw, h:bh, seg});
    bx += bw + W*0.012;
  }
}

function reset() {
  score=0; elapsed=0; awakeCnt=0;
  gauge=0; isAwake=false; awakeT=0;
  shield=false; shieldFlash=0; mult=1;
  pressing=false; obstacles=[]; powerups=[]; particles=[];
  obsTimer=0; obsNext=2.5; puTimer=0; puNext=12;
  bgScroll=0; shake=0; lastTs=null;

  px = W*0.13;
  py = GY - PH();
  pvy = 0; pJumps = 0; onGround = true;

  initBg();

  document.getElementById('awakeOverlay').classList.remove('on');
  document.getElementById('awakeBar').style.display='none';
  document.getElementById('awakeText').classList.remove('pop');
  document.getElementById('shieldHUD').style.display='none';
}

// ═══════════════════════════════════════
//  입력 — 터치 / 마우스 / 키
// ═══════════════════════════════════════
function inputDown(e) {
  // 버튼 터치는 게임 입력으로 처리 안 함
  if(e.target.closest('.btn')) return;
  e.preventDefault();
  if(gState !== 'playing') return;
  pressT = performance.now();
  pressing = true;
  doJump();
}
function inputUp(e) {
  e.preventDefault();
  if(!pressing) return;
  pressing = false;
  if(performance.now()-pressT > 180 && gState==='playing') {
    pvy = Math.min(pvy, LONGJUMP_V());
  }
}
function doJump() {
  if(onGround || pJumps < 1) {
    pvy = JUMP_V();
    pJumps++;
    onGround = false;
    // 점프 파티클
    spawnPtc(px+PW()/2, GY, '#ffffff', 5);
  }
}

// 이벤트는 gameWrapper 전체에 걸기 (UI 레이어 터치 씹힘 방지)
const gw = document.getElementById('gameWrapper');
gw.addEventListener('touchstart', inputDown, {passive:false});
gw.addEventListener('touchend',   inputUp,   {passive:false});
gw.addEventListener('mousedown',  inputDown);
gw.addEventListener('mouseup',    inputUp);
document.addEventListener('keydown', e=>{ if(e.code==='Space'){e.preventDefault();inputDown(e);} });
document.addEventListener('keyup',   e=>{ if(e.code==='Space'){e.preventDefault();inputUp(e);} });

// 버튼 클릭 — pointer-events:all
function startGame() {
  document.getElementById('startScreen').style.display='none';
  reset(); gState='playing';
  showHint();
}
function restartGame() {
  document.getElementById('gameOverScreen').style.display='none';
  reset(); gState='playing';
  showHint();
}
function showHint() {
  const h = document.getElementById('hint');
  h.style.display='block';
  setTimeout(()=>h.style.display='none', 3000);
}

// 버튼 — touchstart + click 둘 다 등록 (터치/PC 모두 대응)
function bindBtn(id, fn) {
  const el = document.getElementById(id);
  let touched = false;
  el.addEventListener('touchstart', e=>{
    e.stopPropagation(); e.preventDefault();
    touched = true;
    fn();
  }, {passive:false});
  el.addEventListener('click', e=>{
    e.stopPropagation();
    if(touched){ touched=false; return; } // 터치 후 click 중복 방지
    fn();
  });
}
bindBtn('startBtn', startGame);
bindBtn('restartBtn', restartGame);

// ═══════════════════════════════════════
//  파티클
// ═══════════════════════════════════════
function spawnPtc(x,y,col,n=8) {
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, s=(2+Math.random()*4)*(W/800);
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,
      life:1, decay:0.028+Math.random()*0.032,
      size:(3+Math.random()*6)*(W/800), col});
  }
}

// ═══════════════════════════════════════
//  각성
// ═══════════════════════════════════════
function triggerAwake() {
  isAwake=true; awakeT=AWAKE_DUR; awakeCnt++; gauge=0; mult=3;
  document.getElementById('awakeOverlay').classList.add('on');
  document.getElementById('awakeBar').style.display='block';
  const t=document.getElementById('awakeText');
  t.classList.remove('pop'); void t.offsetWidth; t.classList.add('pop');
  shake=22;
  spawnPtc(px+PW()/2, py+PH()/2, '#ff2d55', 22);
  // 돌진 파괴
  let d=0;
  obstacles=obstacles.filter(o=>{
    if(d<2){d++; spawnPtc(o.x,GY-o.h/2,'#ff2d55',12); return false;}
    return true;
  });
  setTimeout(()=>document.getElementById('awakeText').classList.remove('pop'),1500);
}
function endAwake() {
  isAwake=false; mult=1;
  document.getElementById('awakeOverlay').classList.remove('on');
  document.getElementById('awakeBar').style.display='none';
}

// ═══════════════════════════════════════
//  충돌
// ═══════════════════════════════════════
function overlap(ax,ay,aw,ah,bx,by,bw,bh) {
  return ax<bx+bw && ax+aw>bx && ay<by+bh && ay+ah>by;
}

// ═══════════════════════════════════════
//  장애물 / 파워업
// ═══════════════════════════════════════
const OBS=[
  {e:'🚗', wr:0.09, hr:0.1},
  {e:'🚧', wr:0.04, hr:0.16},
  {e:'🚲', wr:0.058, hr:0.09},
  {e:'🐕', wr:0.048, hr:0.072},
];
function spawnObs() {
  const o=OBS[Math.floor(Math.random()*OBS.length)];
  obstacles.push({x:W+40, w:W*o.wr, h:H*o.hr, e:o.e, _passed:false});
}
function spawnPU() {
  if(Math.random()<0.55)
    powerups.push({x:W+40, y:GY-PH()-H*0.09, e:'🛡️', _type:'shield'});
}

// ═══════════════════════════════════════
//  게임오버
// ═══════════════════════════════════════
function gameOver() {
  gState='dead';
  spawnPtc(px+PW()/2, py+PH()/2,'#ff4444',22);
  document.getElementById('fDist').textContent=Math.floor(score);
  document.getElementById('fBest').textContent=Math.floor(best);
  document.getElementById('fAwake').textContent=awakeCnt;
  document.getElementById('gameOverScreen').style.display='flex';
  endAwake();
}

// ═══════════════════════════════════════
//  업데이트
// ═══════════════════════════════════════
function update(ts) {
  if(!lastTs) lastTs=ts;
  const dt=Math.min((ts-lastTs)/1000, 0.05);
  lastTs=ts;
  if(gState!=='playing') return;

  elapsed+=dt;
  const s=spd(elapsed)*(isAwake?1.22:1);
  const pw=PW(), ph=PH();

  // 점수
  score += s*dt*12*mult;
  if(score>best) best=score;

  // 게이지
  if(!isAwake){
    gauge+=dt*1.1;
    if(gauge>=100) triggerAwake();
  } else {
    awakeT-=dt;
    document.getElementById('awakeBar').style.width=Math.max(0,awakeT/AWAKE_DUR*100)+'%';
    // 2초: 주변 폭발
    if(awakeT<=AWAKE_DUR-2 && awakeT>AWAKE_DUR-2-dt){
      obstacles=obstacles.filter(o=>{
        if(Math.abs(o.x-px)<W*0.22){spawnPtc(o.x,GY-o.h/2,'#7c3aed',10);return false;}
        return true;
      });
      shake=16;
    }
    if(awakeT<=0) endAwake();
  }

  // 플레이어 물리
  pvy+=GRAVITY;
  py+=pvy;
  if(py>=GY-ph){
    py=GY-ph; pvy=0; onGround=true; pJumps=0;
  } else onGround=false;

  // 배경 스크롤
  bgScroll-=s*dt*60;

  // 구름
  clouds.forEach(c=>{ c.x-=s*dt*25; if(c.x<-W*0.18) c.x=W+W*0.1; });

  // 장애물 스폰
  obsTimer+=dt;
  if(obsTimer>=obsNext){
    obsTimer=0; spawnObs();
    obsNext=Math.max(0.75, 1.5+Math.random()*1.3-elapsed*0.005);
  }

  // 장애물 처리
  const vx=s*dt*(W*0.26);
  obstacles=obstacles.filter(o=>{
    o.x-=vx;
    if(o.x+o.w<0) return false;
    const oy=GY-o.h, pad=pw*0.14;
    if(overlap(px+pad,py+pad,pw-pad*2,ph-pad*2, o.x,oy,o.w,o.h)){
      if(isAwake){ spawnPtc(o.x+o.w/2,oy+o.h/2,'#ff2d55',12); score+=60; return false; }
      else if(shield){ shield=false; shieldFlash=32; document.getElementById('shieldHUD').style.display='none'; spawnPtc(o.x+o.w/2,oy+o.h/2,'#00bfff',12); shake=12; return false; }
      else { gameOver(); return false; }
    }
    // 근소 회피
    if(!o._passed && o.x+o.w<px && o.x+o.w>px-vx-5){
      o._passed=true;
      if(!isAwake) gauge=Math.min(gauge+5,99.5);
    }
    return true;
  });

  // 파워업
  puTimer+=dt;
  if(puTimer>=puNext){ puTimer=0; spawnPU(); puNext=9+Math.random()*9; }
  powerups=powerups.filter(p=>{
    p.x-=vx;
    if(p.x+40<0) return false;
    const ps=W*0.042;
    if(overlap(px,py,pw,ph, p.x,p.y,ps,ps)){
      if(!shield){ shield=true; document.getElementById('shieldHUD').style.display='block'; spawnPtc(p.x,p.y,'#00bfff',10); gauge=Math.min(gauge+3,99.5); }
      return false;
    }
    return true;
  });

  // 파티클
  particles=particles.filter(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.18; p.life-=p.decay; return p.life>0;
  });

  if(shieldFlash>0) shieldFlash--;
  if(shake>0) shake--;

  // HUD
  document.getElementById('distD').textContent=Math.floor(score);
  document.getElementById('bestD').textContent=Math.floor(best);
  document.getElementById('gaugeFill').style.width=Math.min(gauge,100)+'%';
}

// ═══════════════════════════════════════
//  배경 그리기 — 3구간
// ═══════════════════════════════════════
function drawBg() {
  // 하늘 그라디언트
  const sky=ctx.createLinearGradient(0,0,0,GY);
  if(isAwake){
    sky.addColorStop(0,'#100020'); sky.addColorStop(1,'#2d0040');
  } else {
    // 아침 칙칙한 하늘
    sky.addColorStop(0,'#8ea8c3'); sky.addColorStop(1,'#c2d4e0');
  }
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,GY);

  // 태양 (평범한 아침 — 가기 싫은 아침)
  if(!isAwake){
    ctx.save();
    ctx.fillStyle='rgba(255,200,80,0.55)';
    ctx.beginPath(); ctx.arc(W*0.88, H*0.13, H*0.055, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // 구름
  ctx.fillStyle=isAwake?'rgba(120,0,180,0.35)':'rgba(255,255,255,0.75)';
  clouds.forEach(c=>{
    const r=W*0.045*c.s;
    ctx.beginPath();
    ctx.ellipse(c.x,c.y,r,r*0.45,0,0,Math.PI*2);
    ctx.ellipse(c.x+r*0.65,c.y-r*0.12,r*0.65,r*0.38,0,0,Math.PI*2);
    ctx.ellipse(c.x-r*0.55,c.y+r*0.08,r*0.5,r*0.3,0,0,Math.PI*2);
    ctx.fill();
  });

  // ── 건물/배경 오브젝트 ──
  const scroll=(bgScroll*0.4);
  bgObjects.forEach(b=>{
    const bx=((b.x+scroll)%(W*3)+W*3)%(W*3)-W*0.15;
    if(bx>W+b.w || bx+b.w<-10) return;
    const by=GY-b.h;

    if(b.seg===0){
      // 골목 — 낡은 빌라, 회색/베이지
      const shade=isAwake?'#1e0030':'#8a8a8a';
      ctx.fillStyle=shade; ctx.fillRect(bx,by,b.w,b.h);
      // 빌라 라인
      ctx.fillStyle=isAwake?'#2a0040':'#787878';
      ctx.fillRect(bx, by+b.h*0.33, b.w, 3);
      ctx.fillRect(bx, by+b.h*0.66, b.w, 3);
      // 창문
      const wc=isAwake?'rgba(180,80,255,0.3)':'rgba(200,220,255,0.5)';
      ctx.fillStyle=wc;
      const ww=b.w*0.22, wh=b.h*0.12, wgx=b.w*0.32, wgy=b.h*0.2;
      for(let wy=by+wgy; wy<GY-wgy*0.5; wy+=wgy)
        for(let wx=bx+b.w*0.12; wx<bx+b.w-ww; wx+=wgx)
          ctx.fillRect(wx,wy,ww,wh);
      // 담벼락 낙서 (골목 느낌)
      if(b.h<H*0.25){
        ctx.save();
        ctx.fillStyle=isAwake?'rgba(200,0,255,0.25)':'rgba(80,80,80,0.5)';
        ctx.font=`bold ${H*0.02}px sans-serif`;
        ctx.fillText('⚡',bx+b.w*0.2,by+b.h*0.8);
        ctx.restore();
      }
    } else if(b.seg===1){
      // 상가 — PC방 간판 화려
      ctx.fillStyle=isAwake?'#200035':'#6a6a7a'; ctx.fillRect(bx,by,b.w,b.h);
      // PC방 간판 (밝게)
      const signH=b.h*0.22;
      const neonC=isAwake?'rgba(255,50,255,0.9)':'rgba(0,220,255,0.9)';
      ctx.fillStyle=neonC;
      ctx.fillRect(bx+b.w*0.05,by+b.h*0.05,b.w*0.9,signH);
      ctx.save();
      ctx.fillStyle='#000'; ctx.font=`bold ${signH*0.55}px sans-serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('PC방',bx+b.w/2,by+b.h*0.05+signH/2);
      ctx.restore();
      // 창문
      ctx.fillStyle=isAwake?'rgba(200,100,255,0.3)':'rgba(255,220,100,0.6)';
      const ww2=b.w*0.22, wh2=b.h*0.14;
      for(let wy=by+b.h*0.35; wy<GY-b.h*0.1; wy+=b.h*0.22)
        for(let wx=bx+b.w*0.1; wx<bx+b.w-ww2; wx+=b.w*0.32)
          ctx.fillRect(wx,wy,ww2,wh2);
    } else if(b.seg===2){
      // 학교 앞 — 교문 느낌, 칙칙
      ctx.fillStyle=isAwake?'#1a0025':'#5a5a6a'; ctx.fillRect(bx,by,b.w,b.h);
      // 철창 느낌 세로선
      ctx.fillStyle=isAwake?'rgba(150,0,200,0.5)':'rgba(80,80,100,0.8)';
      const barW=b.w*0.06, gap=b.w*0.14;
      for(let gx=bx+gap; gx<bx+b.w-barW; gx+=gap)
        ctx.fillRect(gx,by,barW,b.h);
      // 교문 간판
      ctx.save();
      ctx.fillStyle=isAwake?'rgba(255,0,100,0.8)':'rgba(60,60,80,0.9)';
      ctx.fillRect(bx,by,b.w,b.h*0.18);
      ctx.fillStyle=isAwake?'#ff88aa':'#ddd';
      ctx.font=`bold ${b.h*0.12}px sans-serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('🏫',bx+b.w/2,by+b.h*0.09);
      ctx.restore();
    }
  });

  // 땅
  ctx.fillStyle=isAwake?'#1a0030':'#606060';
  ctx.fillRect(0,GY,W,H-GY);
  // 인도 라인
  ctx.fillStyle=isAwake?'#3a0050':'#808080';
  ctx.fillRect(0,GY,W,H*0.015);
  // 타일 선
  ctx.strokeStyle=isAwake?'rgba(180,0,255,0.3)':'rgba(150,150,150,0.5)';
  ctx.lineWidth=1.5; ctx.setLineDash([W*0.035,W*0.025]);
  const dashOff=bgScroll%((W*0.035+W*0.025));
  ctx.beginPath(); ctx.moveTo(dashOff,GY+H*0.05); ctx.lineTo(W,GY+H*0.05);
  ctx.stroke(); ctx.setLineDash([]);
}

// ═══════════════════════════════════════
//  캐릭터 그리기 — 완전 재설계 v0.2.2
//  머리:몸 = 45:55 만화 비율
//  눈: 흰자+눈동자+하이라이트 3단
//  표정: 인상팍, 볼터치, 땀
// ═══════════════════════════════════════
function drawPlayer() {
  const pw=PW(), ph=PH();
  const cx=px+pw/2;
  const t=elapsed;
  ctx.save();

  // ── 각성 오라 ──
  if(isAwake){
    const og=ctx.createRadialGradient(cx,py+ph*0.5,pw*0.1,cx,py+ph*0.5,pw*2.2);
    og.addColorStop(0,'rgba(200,0,255,0.6)');
    og.addColorStop(0.5,'rgba(255,0,80,0.3)');
    og.addColorStop(1,'rgba(180,0,255,0)');
    ctx.fillStyle=og;
    ctx.beginPath(); ctx.ellipse(cx,py+ph*0.5,pw*2.2,pw*2.2,0,0,Math.PI*2); ctx.fill();
  }

  // ── 보호막 ──
  if(shield){
    ctx.save();
    ctx.strokeStyle='#00bfff'; ctx.lineWidth=3;
    ctx.shadowColor='#00bfff'; ctx.shadowBlur=18;
    ctx.globalAlpha=(shieldFlash%4<2)?0.4:0.9;
    ctx.beginPath(); ctx.ellipse(cx,py+ph*0.5,pw*1.0,ph*0.58,0,0,Math.PI*2); ctx.stroke();
    ctx.restore();
  }

  // ── 달리기 애니 타이밍 ──
  const run=Math.sin(t*14);
  const run2=Math.sin(t*14+Math.PI);
  const bob=Math.abs(Math.sin(t*14))*ph*0.012; // 몸통 상하 바운스

  // ══ 가방 (등 뒤, 먼저 그려야 캐릭터 위에 안 겹침) ══
  const bagY=py+ph*0.38+bob;
  const bagBounce=Math.sin(t*14+0.5)*ph*0.018;
  ctx.save();
  // 가방 본체
  ctx.fillStyle=isAwake?'#5a0090':'#5d4037';
  roundRect(ctx, px+pw*0.72, bagY+bagBounce, pw*0.38, ph*0.30, pw*0.06);
  ctx.fill();
  // 가방 포켓
  ctx.fillStyle=isAwake?'#7a00bb':'#795548';
  roundRect(ctx, px+pw*0.75, bagY+ph*0.08+bagBounce, pw*0.32, ph*0.14, pw*0.04);
  ctx.fill();
  // 가방 끈 (어깨)
  ctx.strokeStyle=isAwake?'#7a00bb':'#795548';
  ctx.lineWidth=pw*0.1; ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(px+pw*0.76, bagY+bagBounce);
  ctx.quadraticCurveTo(px+pw*0.60, py+ph*0.32+bob, px+pw*0.65, py+ph*0.38+bob);
  ctx.stroke();
  ctx.restore();

  // ══ 다리 ══
  const legW=pw*0.30, legH=ph*0.24;
  const legY=py+ph*0.72+bob;
  const shoe=isAwake?'#9900cc':'#cccccc';
  const pant=isAwake?'#2a0050':'#1a1a3a';

  // 왼 다리
  ctx.save();
  ctx.fillStyle=pant;
  roundRect(ctx, px+pw*0.12, legY+run*ph*0.07, legW, legH+Math.abs(run)*ph*0.04, pw*0.06);
  ctx.fill();
  // 왼 신발 (둥글게)
  ctx.fillStyle=shoe;
  ctx.beginPath();
  ctx.ellipse(px+pw*0.12+legW*0.4, legY+legH+run*ph*0.07+ph*0.03, legW*0.55, ph*0.055, 0.1, 0, Math.PI*2);
  ctx.fill();
  // 신발 흰 줄
  ctx.fillStyle='rgba(255,255,255,0.4)';
  ctx.fillRect(px+pw*0.13, legY+legH+run*ph*0.07+ph*0.01, legW*0.35, ph*0.018);
  ctx.restore();

  // 오른 다리
  ctx.save();
  ctx.fillStyle=pant;
  roundRect(ctx, px+pw*0.52, legY+run2*ph*0.07, legW, legH+Math.abs(run2)*ph*0.04, pw*0.06);
  ctx.fill();
  ctx.fillStyle=shoe;
  ctx.beginPath();
  ctx.ellipse(px+pw*0.52+legW*0.4, legY+legH+run2*ph*0.07+ph*0.03, legW*0.55, ph*0.055, 0.1, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.4)';
  ctx.fillRect(px+pw*0.54, legY+legH+run2*ph*0.07+ph*0.01, legW*0.35, ph*0.018);
  ctx.restore();

  // ══ 몸통 — 교복 ══
  const bodyY=py+ph*0.40+bob;
  const bodyH=ph*0.33;

  // 와이셔츠 (흰색 중간)
  ctx.fillStyle=isAwake?'#1a0035':'#eeeef5';
  roundRect(ctx, px+pw*0.22, bodyY, pw*0.56, bodyH, pw*0.04);
  ctx.fill();

  // 교복 재킷 왼쪽
  ctx.fillStyle=isAwake?'#0d0025':'#0d1b5e';
  roundRect(ctx, px+pw*0.08, bodyY, pw*0.22, bodyH, pw*0.04);
  ctx.fill();
  // 교복 재킷 오른쪽
  roundRect(ctx, px+pw*0.70, bodyY, pw*0.22, bodyH, pw*0.04);
  ctx.fill();
  // 재킷 하단 연결
  ctx.fillRect(px+pw*0.08, bodyY+bodyH*0.6, pw*0.84, bodyH*0.4);

  // 넥타이 (날림)
  const tieX=Math.sin(t*11)*pw*0.05;
  ctx.fillStyle='#e53935';
  ctx.beginPath();
  ctx.moveTo(cx-pw*0.05+tieX, bodyY+bodyH*0.05);
  ctx.lineTo(cx+pw*0.05+tieX, bodyY+bodyH*0.05);
  ctx.lineTo(cx+pw*0.03+tieX*1.4, bodyY+bodyH*0.75);
  ctx.lineTo(cx-pw*0.03+tieX*1.4, bodyY+bodyH*0.75);
  ctx.closePath(); ctx.fill();
  // 넥타이 매듭
  ctx.fillStyle='#c62828';
  ctx.beginPath();
  ctx.ellipse(cx+tieX*0.3, bodyY+bodyH*0.1, pw*0.045, ph*0.022, 0, 0, Math.PI*2);
  ctx.fill();

  // 교복 단추
  ctx.fillStyle='rgba(255,255,255,0.6)';
  for(let i=0;i<2;i++){
    ctx.beginPath();
    ctx.arc(cx+pw*0.17, bodyY+bodyH*(0.3+i*0.3), pw*0.03, 0, Math.PI*2);
    ctx.fill();
  }

  // ══ 팔 ══
  const armL=pw*0.20, armH=ph*0.26;
  const armC=isAwake?'#0d0025':'#0d1b5e';

  // 왼팔 (앞으로 뻗음)
  ctx.save();
  ctx.fillStyle=armC;
  ctx.save();
  ctx.translate(px-pw*0.02, bodyY+armH*0.0);
  ctx.rotate(run*0.18);
  roundRect(ctx, 0, 0, armL, armH, pw*0.06);
  ctx.fill();
  // 손
  ctx.fillStyle='#f5c5a0';
  ctx.beginPath(); ctx.ellipse(armL*0.5, armH+ph*0.02, armL*0.38, ph*0.04, 0, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  // 오른팔
  ctx.save();
  ctx.translate(px+pw*0.80, bodyY);
  ctx.rotate(run2*0.18);
  ctx.fillStyle=armC;
  roundRect(ctx, 0, 0, armL, armH, pw*0.06);
  ctx.fill();
  ctx.fillStyle='#f5c5a0';
  ctx.beginPath(); ctx.ellipse(armL*0.5, armH+ph*0.02, armL*0.38, ph*0.04, 0, 0, Math.PI*2); ctx.fill();
  ctx.restore();
  ctx.restore();

  // ══ 머리 ══
  // 비율: 머리 = ph의 42%, 몸 = 58%
  const headR=pw*0.52;    // 머리 반지름 (가로)
  const headRY=ph*0.21;   // 머리 반지름 (세로)
  const headCX=cx;
  const headCY=py+ph*0.21+bob;

  // 목
  ctx.fillStyle='#f0b890';
  ctx.fillRect(cx-pw*0.12, headCY+headRY*0.78, pw*0.24, ph*0.06);

  // ── 머리카락 (뒤쪽, 헝클어짐) ──
  ctx.fillStyle=isAwake?'#0a0010':'#1a1008';
  // 메인 머리 덩어리
  ctx.beginPath();
  ctx.ellipse(headCX, headCY-headRY*0.1, headR*1.08, headRY*1.08, 0, 0, Math.PI*2);
  ctx.fill();
  // 앞머리 튀어나온 것들
  ctx.beginPath(); ctx.ellipse(headCX-headR*0.55, headCY-headRY*0.75, headR*0.32, headRY*0.42, -0.5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(headCX-headR*0.18, headCY-headRY*1.05, headR*0.28, headRY*0.38, -0.1, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(headCX+headR*0.22, headCY-headRY*0.95, headR*0.30, headRY*0.35, 0.3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(headCX+headR*0.58, headCY-headRY*0.65, headR*0.26, headRY*0.36, 0.6, 0, Math.PI*2); ctx.fill();

  // ── 얼굴 (피부색) ──
  const skinC=isAwake?'#c88060':'#f5c5a0';
  ctx.fillStyle=skinC;
  ctx.beginPath();
  ctx.ellipse(headCX, headCY, headR, headRY, 0, 0, Math.PI*2);
  ctx.fill();

  // 얼굴 윤곽선
  ctx.strokeStyle='rgba(180,100,60,0.25)';
  ctx.lineWidth=pw*0.025;
  ctx.beginPath();
  ctx.ellipse(headCX, headCY, headR, headRY, 0, 0, Math.PI*2);
  ctx.stroke();

  // ── 앞머리 (얼굴 위에 덮임) ──
  ctx.fillStyle=isAwake?'#0a0010':'#1a1008';
  ctx.beginPath();
  ctx.ellipse(headCX-headR*0.3, headCY-headRY*0.55, headR*0.38, headRY*0.38, -0.2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath();
  ctx.ellipse(headCX+headR*0.1, headCY-headRY*0.72, headR*0.32, headRY*0.32, 0.15, 0, Math.PI*2); ctx.fill();
  // 앞머리 끝 삐친 것
  ctx.beginPath();
  ctx.moveTo(headCX-headR*0.55, headCY-headRY*0.1);
  ctx.quadraticCurveTo(headCX-headR*0.72, headCY+headRY*0.05, headCX-headR*0.62, headCY+headRY*0.25);
  ctx.lineWidth=pw*0.12; ctx.strokeStyle=isAwake?'#0a0010':'#1a1008'; ctx.stroke();

  // ── 눈썹 (팍 내려간, 두껍게) ──
  ctx.lineCap='round';
  ctx.lineWidth=ph*0.028;
  ctx.strokeStyle=isAwake?'#000':'#1a1008';

  // 왼 눈썹 (인상 쓰며 내려감, 안쪽이 낮음)
  ctx.beginPath();
  ctx.moveTo(headCX-headR*0.58, headCY-headRY*0.28);
  ctx.quadraticCurveTo(headCX-headR*0.38, headCY-headRY*0.18, headCX-headR*0.14, headCY-headRY*0.24);
  ctx.stroke();

  // 오른 눈썹
  ctx.beginPath();
  ctx.moveTo(headCX+headR*0.14, headCY-headRY*0.24);
  ctx.quadraticCurveTo(headCX+headR*0.38, headCY-headRY*0.18, headCX+headR*0.58, headCY-headRY*0.28);
  ctx.stroke();

  // ── 눈 (흰자 + 눈동자 + 하이라이트) ──
  const eyeY=headCY-headRY*0.04;
  const eyeRX=headR*0.22, eyeRY=headRY*0.26;
  const leftEyeX=headCX-headR*0.34;
  const rightEyeX=headCX+headR*0.34;

  if(isAwake){
    // 각성 눈 — 붉게 타오름
    for(const ex of [leftEyeX, rightEyeX]){
      ctx.save();
      ctx.shadowColor='#ff2d55'; ctx.shadowBlur=pw*0.5;
      // 흰자 (빨갛게)
      ctx.fillStyle='#ff6688';
      ctx.beginPath(); ctx.ellipse(ex, eyeY, eyeRX, eyeRY, 0, 0, Math.PI*2); ctx.fill();
      // 눈동자 (붉은 불꽃)
      ctx.fillStyle='#ff0033';
      ctx.beginPath(); ctx.ellipse(ex, eyeY, eyeRX*0.6, eyeRY*0.75, 0, 0, Math.PI*2); ctx.fill();
      // 중심
      ctx.fillStyle='#800000';
      ctx.beginPath(); ctx.ellipse(ex, eyeY, eyeRX*0.28, eyeRY*0.38, 0, 0, Math.PI*2); ctx.fill();
      // 하이라이트
      ctx.shadowBlur=0;
      ctx.fillStyle='rgba(255,200,200,0.9)';
      ctx.beginPath(); ctx.ellipse(ex-eyeRX*0.22, eyeY-eyeRY*0.28, eyeRX*0.16, eyeRY*0.18, 0, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }
  } else {
    // 일반 눈 — 흰자 + 다크 눈동자 + 빛
    for(const ex of [leftEyeX, rightEyeX]){
      // 흰자
      ctx.fillStyle='#fff';
      ctx.beginPath(); ctx.ellipse(ex, eyeY, eyeRX, eyeRY, 0, 0, Math.PI*2); ctx.fill();
      // 눈테 (위쪽 속눈썹 효과)
      ctx.strokeStyle='#1a1008'; ctx.lineWidth=pw*0.025;
      ctx.beginPath(); ctx.ellipse(ex, eyeY, eyeRX, eyeRY, 0, Math.PI, Math.PI*2); ctx.stroke();
      // 눈동자
      ctx.fillStyle='#2c1810';
      ctx.beginPath(); ctx.ellipse(ex, eyeY+eyeRY*0.05, eyeRX*0.6, eyeRY*0.72, 0, 0, Math.PI*2); ctx.fill();
      // 눈 색 (다크브라운)
      ctx.fillStyle='#5c3010';
      ctx.beginPath(); ctx.ellipse(ex, eyeY+eyeRY*0.05, eyeRX*0.38, eyeRY*0.48, 0, 0, Math.PI*2); ctx.fill();
      // 하이라이트 (크게, 생동감)
      ctx.fillStyle='rgba(255,255,255,0.95)';
      ctx.beginPath(); ctx.ellipse(ex-eyeRX*0.20, eyeY-eyeRY*0.20, eyeRX*0.20, eyeRY*0.22, 0, 0, Math.PI*2); ctx.fill();
      // 보조 하이라이트 (작게)
      ctx.fillStyle='rgba(255,255,255,0.6)';
      ctx.beginPath(); ctx.ellipse(ex+eyeRX*0.18, eyeY+eyeRY*0.10, eyeRX*0.10, eyeRY*0.10, 0, 0, Math.PI*2); ctx.fill();
      // 위쪽 속눈썹 선
      ctx.strokeStyle='#1a1008'; ctx.lineWidth=pw*0.04; ctx.lineCap='round';
      ctx.beginPath();
      ctx.moveTo(ex-eyeRX, eyeY-eyeRY*0.3);
      ctx.quadraticCurveTo(ex, eyeY-eyeRY*1.05, ex+eyeRX, eyeY-eyeRY*0.3);
      ctx.stroke();
    }
  }

  // ── 코 (작은 삼각형, 귀여운) ──
  ctx.fillStyle='rgba(180,100,60,0.35)';
  ctx.beginPath();
  ctx.moveTo(headCX, eyeY+headRY*0.22);
  ctx.lineTo(headCX-headR*0.07, eyeY+headRY*0.38);
  ctx.lineTo(headCX+headR*0.07, eyeY+headRY*0.38);
  ctx.closePath(); ctx.fill();

  // ── 입 (억울, 입꼬리 팍 내려감) ──
  ctx.strokeStyle='#8b4513'; ctx.lineWidth=ph*0.022; ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(headCX-headR*0.25, eyeY+headRY*0.60);
  ctx.quadraticCurveTo(headCX, eyeY+headRY*0.52, headCX+headR*0.25, eyeY+headRY*0.60);
  ctx.stroke();
  // 입꼬리 내려간 선
  ctx.beginPath();
  ctx.moveTo(headCX-headR*0.25, eyeY+headRY*0.60);
  ctx.lineTo(headCX-headR*0.32, eyeY+headRY*0.70);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(headCX+headR*0.25, eyeY+headRY*0.60);
  ctx.lineTo(headCX+headR*0.32, eyeY+headRY*0.70);
  ctx.stroke();

  // ── 볼터치 (귀여움) ──
  ctx.fillStyle='rgba(255,140,120,0.28)';
  ctx.beginPath(); ctx.ellipse(headCX-headR*0.60, eyeY+headRY*0.30, headR*0.22, headRY*0.14, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(headCX+headR*0.60, eyeY+headRY*0.30, headR*0.22, headRY*0.14, 0, 0, Math.PI*2); ctx.fill();

  // ── 땀방울 (지각 위기) ──
  ctx.fillStyle='rgba(100,180,255,0.8)';
  ctx.beginPath();
  ctx.moveTo(headCX+headR*0.72, headCY-headRY*0.5);
  ctx.quadraticCurveTo(headCX+headR*0.80, headCY-headRY*0.25, headCX+headR*0.68, headCY-headRY*0.15);
  ctx.quadraticCurveTo(headCX+headR*0.58, headCY-headRY*0.0, headCX+headR*0.60, headCY-headRY*0.18);
  ctx.quadraticCurveTo(headCX+headR*0.62, headCY-headRY*0.35, headCX+headR*0.72, headCY-headRY*0.5);
  ctx.fill();

  // ── 각성 마법진 ──
  if(isAwake){
    const mr=pw*1.5+Math.sin(t*8)*pw*0.18;
    for(let i=0;i<3;i++){
      ctx.save();
      ctx.strokeStyle=`rgba(220,0,255,${0.35+Math.sin(t*5+i)*0.15})`;
      ctx.lineWidth=1.8; ctx.shadowColor='#ff2d55'; ctx.shadowBlur=10;
      ctx.translate(cx,GY); ctx.rotate(t*(1.5+i*0.5)+i*Math.PI/3);
      ctx.beginPath();
      for(let j=0;j<6;j++){
        const a=(j/6)*Math.PI*2;
        const rx=Math.cos(a)*(mr-i*pw*0.28), ry=Math.sin(a)*(mr-i*pw*0.28)*0.2;
        j===0?ctx.moveTo(rx,ry):ctx.lineTo(rx,ry);
      }
      ctx.closePath(); ctx.stroke(); ctx.restore();
    }
  }

  ctx.restore();
}

// ── 유틸: 둥근 사각형 ──
function roundRect(ctx, x, y, w, h, r) {
  r = Math.min(r, w/2, h/2);
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

// ═══════════════════════════════════════
//  장애물 / 파워업 / 파티클 그리기
// ═══════════════════════════════════════
function drawObs() {
  obstacles.forEach(o=>{
    const oy=GY-o.h;
    ctx.save();
    if(isAwake){ctx.shadowColor='#ff2d55'; ctx.shadowBlur=12;}
    ctx.font=`${o.h*0.92}px serif`; ctx.textAlign='center';
    ctx.fillText(o.e, o.x+o.w/2, oy+o.h*0.9);
    ctx.restore();
  });
}

function drawPU() {
  const ps=W*0.042;
  powerups.forEach(p=>{
    const bob=Math.sin(elapsed*4.5)*H*0.013;
    ctx.save();
    ctx.font=`${ps}px serif`; ctx.textAlign='center';
    ctx.shadowColor='#00bfff'; ctx.shadowBlur=14;
    ctx.fillText(p.e, p.x+ps/2, p.y+bob);
    ctx.restore();
  });
}

function drawPtc() {
  particles.forEach(p=>{
    ctx.save(); ctx.globalAlpha=p.life;
    ctx.fillStyle=p.col;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });
}

// ═══════════════════════════════════════
//  메인 렌더
// ═══════════════════════════════════════
function render() {
  ctx.save();
  if(shake>0) ctx.translate((Math.random()-0.5)*shake*0.45,(Math.random()-0.5)*shake*0.45);
  drawBg();
  drawObs();
  drawPU();
  drawPlayer();
  drawPtc();
  ctx.restore();
}

// ═══════════════════════════════════════
//  루프
// ═══════════════════════════════════════
function loop(ts) {
  update(ts);
  render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
