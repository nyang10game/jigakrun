<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>지각런</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
:root{--acc:#ff2d55;--pur:#7c3aed;--neon:#00f5ff;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:none;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Noto Sans KR',sans-serif;user-select:none;-webkit-user-select:none;position:fixed;top:0;left:0;}
#gameWrapper{position:fixed;top:0;left:0;width:100dvw;height:100dvh;overflow:hidden;background:#000;}
canvas{display:block;width:100%;height:100%;border:none;outline:none;}

/* SVG 레이어 */
#svgLayer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible;}
#playerWrap{position:absolute;transform-origin:center bottom;}
.obsSVG{position:absolute;transform-origin:center bottom;}
.puSVG{position:absolute;transform-origin:center center;}

/* 캐릭터 애니 */
@keyframes run-body{0%,100%{transform:translateY(0) rotate(6deg);}50%{transform:translateY(-8px) rotate(6deg);}}
@keyframes run-body-fast{0%,100%{transform:translateY(0) rotate(8deg);}50%{transform:translateY(-11px) rotate(8deg);}}
@keyframes awake-body{0%,100%{transform:translateY(0) rotate(8deg);filter:drop-shadow(0 0 12px #ff2d55) drop-shadow(0 0 25px #7c3aed);}50%{transform:translateY(-13px) rotate(8deg);filter:drop-shadow(0 0 22px #ff2d55) drop-shadow(0 0 45px #7c3aed);}}
@keyframes leg-fwd{0%,100%{transform:rotate(-42deg);}50%{transform:rotate(48deg);}}
@keyframes leg-back{0%,100%{transform:rotate(48deg);}50%{transform:rotate(-42deg);}}
@keyframes arm-fwd{0%,100%{transform:rotate(-38deg);}50%{transform:rotate(36deg);}}
@keyframes arm-back{0%,100%{transform:rotate(36deg);}50%{transform:rotate(-38deg);}}
@keyframes bag-dangle{0%,100%{transform:rotate(-7deg) translateY(0);}50%{transform:rotate(-13deg) translateY(4px);}}
@keyframes tie-flap{0%,100%{transform:rotate(-14deg);}50%{transform:rotate(14deg);}}
@keyframes blink{0%,88%,100%{transform:scaleY(1);}93%{transform:scaleY(0.06);}}
@keyframes sweat-drop{0%{opacity:0;transform:translateY(-3px);}20%{opacity:1;}80%{opacity:1;transform:translateY(10px);}100%{opacity:0;transform:translateY(14px);}}
@keyframes hair-awake{0%,100%{transform:translateY(0);}50%{transform:translateY(-4px);}}
@keyframes eye-fire{0%,100%{filter:drop-shadow(0 0 5px #ff0000);}50%{filter:drop-shadow(0 0 12px #ff4400);}}
@keyframes aura-spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
@keyframes aura-spin-rev{from{transform:rotate(0deg);}to{transform:rotate(-360deg);}}
@keyframes ptc-fly{0%{opacity:1;transform:translate(0,0) scale(1);}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0);}}
@keyframes lightning{0%,89%,100%{opacity:0;}91%,95%{opacity:1;}93%,97%{opacity:0;}}
/* 장애물 애니 */
@keyframes dog-run{0%,100%{transform:rotate(-3deg) translateY(0);}50%{transform:rotate(3deg) translateY(-5px);}}
@keyframes dog-leg{0%,100%{transform:rotate(-35deg);}50%{transform:rotate(35deg);}}
@keyframes delivery-wobble{0%,100%{transform:rotate(-2deg) translateY(0);}50%{transform:rotate(2deg) translateY(-4px);}}
@keyframes box-shake{0%,100%{transform:rotate(-3deg);}50%{transform:rotate(3deg);}}
@keyframes moto-zoom{0%,100%{transform:translateY(0);}50%{transform:translateY(-3px);}}
@keyframes cone-wave{0%,100%{transform:rotate(-1deg);}50%{transform:rotate(1deg);}}
@keyframes energy-bob{0%,100%{transform:translateY(0) rotate(-5deg);}50%{transform:translateY(-8px) rotate(5deg);}}
@keyframes energy-glow{0%,100%{filter:drop-shadow(0 0 6px #00f5ff);}50%{filter:drop-shadow(0 0 16px #00f5ff);}}
@keyframes shield-bob{0%,100%{transform:translateY(0) rotate(3deg);}50%{transform:translateY(-8px) rotate(-3deg);}}

/* HUD */
#hud{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:10px 14px;pointer-events:none;}
#scoreBox{background:rgba(0,0,0,0.65);border-radius:10px;padding:6px 13px;color:#fff;font-weight:700;font-size:clamp(11px,2.8vw,16px);line-height:1.8;border:1px solid rgba(255,255,255,0.12);backdrop-filter:blur(8px);}
#gaugeBox{background:rgba(0,0,0,0.65);border-radius:10px;padding:6px 13px;color:#fff;font-weight:700;text-align:center;font-size:clamp(10px,2.2vw,13px);border:1px solid rgba(255,255,255,0.12);backdrop-filter:blur(8px);min-width:clamp(120px,22vw,180px);}
#gaugeBar{width:100%;height:10px;background:rgba(255,255,255,0.12);border-radius:5px;margin-top:4px;overflow:hidden;}
#gaugeFill{height:100%;width:0%;background:linear-gradient(90deg,#7c3aed,#ff2d55);border-radius:5px;box-shadow:0 0 8px #ff2d55;transition:width 0.1s;}
#shieldHUD{position:absolute;top:10px;right:14px;background:rgba(0,180,255,0.2);border:2px solid #00bfff;border-radius:8px;padding:4px 10px;color:#00bfff;font-size:clamp(11px,2.2vw,14px);font-weight:900;display:none;backdrop-filter:blur(4px);}
#awakeOverlay{position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity 0.3s;box-shadow:inset 0 0 120px rgba(124,58,237,0.8);}
#awakeOverlay.on{opacity:1;animation:pulseAura 0.5s infinite alternate;}
@keyframes pulseAura{from{box-shadow:inset 0 0 100px rgba(124,58,237,0.8);}to{box-shadow:inset 0 0 160px rgba(255,45,85,0.9);}}
#awakeText{position:absolute;top:36%;left:50%;transform:translate(-50%,-50%) scale(0);color:#fff;font-weight:900;opacity:0;font-size:clamp(20px,5.5vw,42px);text-shadow:0 0 20px #ff2d55,0 0 50px #7c3aed;pointer-events:none;white-space:nowrap;z-index:10;}
#awakeText.pop{animation:popIn 0.6s forwards;}
@keyframes popIn{0%{transform:translate(-50%,-50%) scale(0);opacity:0;}55%{transform:translate(-50%,-50%) scale(1.25);opacity:1;}75%{transform:translate(-50%,-50%) scale(0.92);opacity:1;}100%{transform:translate(-50%,-50%) scale(1);opacity:1;}}
#awakeBar{position:absolute;bottom:0;left:0;height:5px;background:linear-gradient(90deg,#7c3aed,#ff2d55);transform-origin:left;display:none;}
#hint{position:absolute;bottom:clamp(55px,13vh,85px);left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.75);border:2px solid rgba(255,255,255,0.3);border-radius:50px;padding:10px 26px;color:#fff;font-size:clamp(13px,3vw,18px);font-weight:700;pointer-events:none;white-space:nowrap;display:none;animation:blink2 0.85s infinite alternate;}
@keyframes blink2{from{opacity:1}to{opacity:0.2}}
#ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
#startScreen,#gameOverScreen{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;background:rgba(0,0,0,0.85);color:#fff;backdrop-filter:blur(12px);pointer-events:all;}
#startScreen h1{font-size:clamp(42px,10vw,76px);font-weight:900;background:linear-gradient(135deg,#fff 0%,#ff2d55 45%,#7c3aed 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-2px;margin-bottom:4px;}
#startScreen .sub{font-size:clamp(11px,2.5vw,15px);color:rgba(255,255,255,0.45);margin-bottom:18px;}
#controlGuide{display:flex;gap:10px;margin-bottom:22px;}
.ctrl{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);border-radius:12px;padding:10px 14px;text-align:center;min-width:clamp(75px,14vw,110px);}
.ctrl .icon{font-size:clamp(18px,4vw,26px);margin-bottom:3px;}
.ctrl .label{font-size:clamp(10px,1.8vw,12px);color:rgba(255,255,255,0.5);}
.btn{background:linear-gradient(135deg,#7c3aed,#ff2d55);border:none;border-radius:50px;color:#fff;font-size:clamp(15px,3.5vw,22px);font-weight:900;font-family:'Noto Sans KR',sans-serif;padding:clamp(12px,2.5vw,18px) clamp(32px,8vw,60px);cursor:pointer;min-height:52px;box-shadow:0 4px 28px rgba(124,58,237,0.55);pointer-events:all;transition:transform 0.1s;}
.btn:active{transform:scale(0.95);}
#gameOverScreen h2{font-size:clamp(28px,7vw,50px);font-weight:900;color:#ff2d55;margin-bottom:8px;text-shadow:0 0 24px rgba(255,45,85,0.7);}
#gameOverScreen .stats{font-size:clamp(12px,2.5vw,16px);color:rgba(255,255,255,0.6);margin-bottom:22px;text-align:center;line-height:2.4;}
#gameOverScreen .stats span{color:#fff;font-weight:700;}
#rotateMsg{display:none;position:fixed;inset:0;background:#0d0d1a;color:#fff;flex-direction:column;justify-content:center;align-items:center;font-size:clamp(15px,4vw,20px);font-weight:700;gap:16px;z-index:999;}
#rotateMsg .rIcon{font-size:clamp(40px,10vw,60px);animation:rot 1.2s infinite alternate;}
@keyframes rot{from{transform:rotate(0deg)}to{transform:rotate(90deg)}}
@media(orientation:portrait){#rotateMsg{display:flex;}#gameWrapper{display:none;}}
</style>
</head>
<body>

<div id="rotateMsg"><div class="rIcon">📱</div><div>핸드폰을 가로로 돌려주세요!</div></div>

<div id="gameWrapper">
  <canvas id="gc"></canvas>

  <!-- ══ SVG 캐릭터 레이어 ══ -->
  <div id="svgLayer">

    <!-- ── 주인공 SVG ── -->
    <div id="playerWrap">
      <svg id="playerSVG" viewBox="-20 -10 160 230" overflow="visible"
           style="width:auto;height:100%;display:block;">

        <!-- 각성 오라 (평소엔 숨김) -->
        <g id="auraLayer" opacity="0">
          <g style="animation:aura-spin 2.5s linear infinite;transform-origin:60px 140px;">
            <ellipse cx="60" cy="140" rx="90" ry="90" fill="none" stroke="rgba(124,58,237,0.4)" stroke-width="2.5" stroke-dasharray="10,7"/>
            <ellipse cx="60" cy="140" rx="70" ry="70" fill="none" stroke="rgba(255,45,85,0.3)" stroke-width="1.5" stroke-dasharray="6,10"/>
          </g>
          <g style="animation:aura-spin-rev 1.8s linear infinite;transform-origin:60px 140px;">
            <ellipse cx="60" cy="140" rx="55" ry="55" fill="none" stroke="rgba(255,45,85,0.5)" stroke-width="2" stroke-dasharray="8,5"/>
          </g>
          <!-- 파티클 -->
          <circle cx="60" cy="80" r="3.5" fill="#ff2d55" style="animation:ptc-fly 1.4s ease-out infinite;--tx:-40px;--ty:-50px;"/>
          <circle cx="60" cy="80" r="2.5" fill="#7c3aed" style="animation:ptc-fly 1.4s ease-out infinite;animation-delay:0.35s;--tx:48px;--ty:-42px;"/>
          <circle cx="60" cy="80" r="4" fill="#ff2d55" style="animation:ptc-fly 1.4s ease-out infinite;animation-delay:0.7s;--tx:-32px;--ty:-62px;"/>
          <circle cx="60" cy="80" r="2" fill="#00f5ff" style="animation:ptc-fly 1.4s ease-out infinite;animation-delay:1.05s;--tx:38px;--ty:-55px;"/>
          <!-- 번개 -->
          <path d="M10,50 L22,85 L14,85 L30,125" stroke="#ffff00" stroke-width="2.5" fill="none" stroke-linecap="round" style="animation:lightning 2.2s infinite;" opacity="0"/>
          <path d="M110,45 L100,80 L108,80 L92,118" stroke="#ff2d55" stroke-width="2" fill="none" stroke-linecap="round" style="animation:lightning 2.2s infinite;animation-delay:0.8s;" opacity="0"/>
          <!-- 바닥 마법진 -->
          <g style="animation:aura-spin 3s linear infinite;transform-origin:60px 208px;">
            <ellipse cx="60" cy="208" rx="68" ry="18" fill="none" stroke="rgba(124,58,237,0.55)" stroke-width="2" stroke-dasharray="9,6"/>
            <ellipse cx="60" cy="208" rx="48" ry="12" fill="none" stroke="rgba(255,45,85,0.4)" stroke-width="1.5"/>
            <ellipse cx="60" cy="208" rx="28" ry="7" fill="rgba(124,58,237,0.15)"/>
          </g>
        </g>

        <!-- ── 캐릭터 바디 (애니 wrapper) ── -->
        <g id="charBody" style="animation:run-body 0.42s ease-in-out infinite;transform-origin:60px 208px;">

          <!-- 속도선 -->
          <g id="speedLines">
            <line x1="-20" y1="68" x2="-5" y2="68" stroke="rgba(255,255,255,0.22)" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="-25" y1="82" x2="-7" y2="82" stroke="rgba(255,255,255,0.16)" stroke-width="2" stroke-linecap="round"/>
            <line x1="-18" y1="96" x2="-5" y2="96" stroke="rgba(255,255,255,0.10)" stroke-width="1.5" stroke-linecap="round"/>
          </g>

          <!-- 가방 -->
          <g style="animation:bag-dangle 0.42s ease-in-out infinite;transform-origin:82px 95px;">
            <rect x="83" y="80" width="36" height="46" rx="7" fill="#5d4037"/>
            <path d="M83,86 Q73,74 77,62" stroke="#795548" stroke-width="7" fill="none" stroke-linecap="round"/>
            <rect x="87" y="97" width="28" height="20" rx="4" fill="#6d4c41"/>
            <line x1="89" y1="106" x2="113" y2="106" stroke="#a1887f" stroke-width="1.5"/>
            <circle cx="113" cy="106" r="2.2" fill="#bcaaa4"/>
            <circle cx="101" cy="80" r="5" fill="none" stroke="#a1887f" stroke-width="2"/>
            <text x="101" y="84" text-anchor="middle" font-size="6" fill="#a1887f">★</text>
            <rect x="84" y="81" width="34" height="44" rx="6" fill="none" stroke="#6d4c41" stroke-width="1.5" stroke-dasharray="4,3"/>
          </g>

          <!-- 오른 다리 (뒤) -->
          <g style="animation:leg-back 0.42s ease-in-out infinite;transform-origin:68px 148px;">
            <rect x="57" y="148" width="23" height="50" rx="8" fill="#162055"/>
            <rect x="57" y="188" width="23" height="7" rx="3" fill="#eee"/>
            <ellipse cx="68" cy="202" rx="19" ry="9" fill="#1a1a1a"/>
            <ellipse cx="63" cy="199" rx="11" ry="6" fill="#2a2a2a"/>
            <rect x="52" y="200" width="19" height="2.5" rx="1.2" fill="rgba(255,255,255,0.4)"/>
          </g>

          <!-- 왼 다리 (앞) -->
          <g style="animation:leg-fwd 0.42s ease-in-out infinite;transform-origin:47px 148px;">
            <rect x="35" y="148" width="23" height="50" rx="8" fill="#1a2580"/>
            <rect x="35" y="188" width="23" height="7" rx="3" fill="#eee"/>
            <ellipse cx="46" cy="202" rx="19" ry="9" fill="#1a1a1a"/>
            <ellipse cx="41" cy="199" rx="11" ry="6" fill="#2a2a2a"/>
            <rect x="30" y="200" width="19" height="2.5" rx="1.2" fill="rgba(255,255,255,0.4)"/>
          </g>

          <!-- 몸통 교복 -->
          <rect x="27" y="90" width="66" height="62" rx="10" fill="#eeeef8"/>
          <rect x="27" y="90" width="23" height="62" rx="0" fill="#1a237e"/>
          <rect x="27" y="90" width="23" height="10" rx="8" fill="#1a237e"/>
          <rect x="70" y="90" width="23" height="62" rx="0" fill="#1a237e"/>
          <rect x="70" y="90" width="23" height="10" rx="8" fill="#1a237e"/>
          <rect x="27" y="128" width="66" height="24" fill="#1a237e"/>
          <polygon points="50,90 60,104 50,112" fill="#162055"/>
          <polygon points="70,90 60,104 70,112" fill="#162055"/>
          <circle cx="68" cy="102" r="2.8" fill="rgba(255,255,255,0.4)"/>
          <circle cx="68" cy="116" r="2.8" fill="rgba(255,255,255,0.4)"/>
          <circle cx="68" cy="130" r="2.8" fill="rgba(255,255,255,0.4)"/>
          <rect x="29" y="94" width="16" height="12" rx="2" fill="rgba(0,0,0,0.12)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
          <path d="M31,94 L37,90 L43,94" fill="rgba(255,100,100,0.6)"/>

          <!-- 각성 에너지 균열 (평소 숨김) -->
          <g id="crackLines" opacity="0">
            <path d="M33,102 L44,114 L36,120 L50,134" stroke="rgba(200,0,255,0.7)" stroke-width="1.8" fill="none" stroke-linecap="round"/>
            <path d="M78,97 L70,110 L80,118" stroke="rgba(255,45,85,0.6)" stroke-width="1.2" fill="none" stroke-linecap="round"/>
          </g>

          <!-- 넥타이 -->
          <g style="animation:tie-flap 0.42s ease-in-out infinite;transform-origin:58px 94px;">
            <ellipse cx="58" cy="94" rx="6.5" ry="5.5" fill="#c62828"/>
            <polygon points="52,97 64,97 62,134 54,134" fill="#e53935"/>
            <polygon points="52,97 64,97 58,105" fill="#c62828"/>
            <line x1="54" y1="108" x2="63" y2="106" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
            <line x1="54" y1="119" x2="63" y2="117" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
            <!-- 각성 넥타이 불꽃 (숨김) -->
            <g id="tieFire" opacity="0">
              <path d="M54,134 Q50,144 58,150 Q66,144 62,134Z" fill="rgba(255,100,0,0.8)"/>
              <path d="M55,126 Q52,134 58,139 Q64,134 61,126Z" fill="rgba(255,50,0,0.6)"/>
            </g>
          </g>

          <!-- 오른팔 -->
          <g style="animation:arm-back 0.42s ease-in-out infinite;transform-origin:84px 98px;">
            <rect x="77" y="98" width="20" height="40" rx="8" fill="#162055"/>
            <rect x="77" y="132" width="20" height="5" rx="2" fill="#eee"/>
            <ellipse cx="87" cy="142" rx="11" ry="9" fill="#f5c5a0"/>
            <ellipse cx="80" cy="139" rx="5" ry="4" fill="#f0b890"/>
            <ellipse cx="94" cy="139" rx="5" ry="4" fill="#f0b890"/>
            <ellipse cx="87" cy="135" rx="5" ry="3.5" fill="#f0b890"/>
          </g>

          <!-- 왼팔 -->
          <g style="animation:arm-fwd 0.42s ease-in-out infinite;transform-origin:32px 98px;">
            <rect x="20" y="98" width="20" height="40" rx="8" fill="#1a237e"/>
            <rect x="20" y="132" width="20" height="5" rx="2" fill="#eee"/>
            <ellipse cx="30" cy="142" rx="11" ry="9" fill="#f5c5a0"/>
            <ellipse cx="23" cy="139" rx="5" ry="4" fill="#f0b890"/>
            <ellipse cx="37" cy="139" rx="5" ry="4" fill="#f0b890"/>
            <ellipse cx="30" cy="135" rx="5" ry="3.5" fill="#f0b890"/>
          </g>

          <!-- 목 -->
          <rect x="48" y="72" width="24" height="22" rx="6" fill="#f0b890"/>
          <line x1="55" y1="74" x2="55" y2="90" stroke="rgba(180,100,60,0.18)" stroke-width="1.5"/>
          <line x1="65" y1="74" x2="65" y2="90" stroke="rgba(180,100,60,0.18)" stroke-width="1.5"/>

          <!-- 머리카락 뒤 -->
          <g id="hairBack">
            <ellipse cx="60" cy="38" rx="34" ry="34" fill="#18100a"/>
            <path d="M28,30 Q18,8 28,0 Q34,14 38,22Z" fill="#18100a"/>
            <path d="M42,18 Q38,-4 50,-6 Q50,10 52,18Z" fill="#18100a"/>
            <path d="M60,12 Q58,-8 68,-9 Q66,7 65,14Z" fill="#18100a"/>
            <path d="M75,18 Q80,-4 88,1 Q82,14 78,22Z" fill="#18100a"/>
            <path d="M86,30 Q96,10 103,17 Q93,27 88,34Z" fill="#18100a"/>
          </g>

          <!-- 얼굴 -->
          <ellipse id="faceBase" cx="60" cy="44" rx="30" ry="34" fill="#f5c5a0"/>
          <ellipse cx="30" cy="46" rx="6" ry="9" fill="#f0b080"/>
          <ellipse cx="30" cy="46" rx="3" ry="5" fill="#e8a070"/>
          <ellipse cx="90" cy="46" rx="6" ry="9" fill="#f0b080"/>
          <ellipse cx="90" cy="46" rx="3" ry="5" fill="#e8a070"/>

          <!-- 앞머리 -->
          <path d="M30,30 Q36,14 46,20 Q44,30 40,37Z" fill="#18100a"/>
          <path d="M46,20 Q52,4 60,13 Q56,24 52,31Z" fill="#18100a"/>
          <path d="M66,13 Q74,2 82,15 Q74,23 70,31Z" fill="#18100a"/>
          <path d="M26,37 Q15,26 20,15" stroke="#18100a" stroke-width="10" fill="none" stroke-linecap="round"/>

          <!-- 눈썹 (인상) -->
          <path d="M33,32 Q43,24 55,30" stroke="#18100a" stroke-width="4.8" fill="none" stroke-linecap="round"/>
          <path d="M65,30 Q75,24 87,32" stroke="#18100a" stroke-width="4.8" fill="none" stroke-linecap="round"/>
          <path d="M55,30 Q59,26 65,30" stroke="#18100a" stroke-width="2.2" fill="none"/>
          <line x1="56" y1="28" x2="58" y2="35" stroke="#c8905a" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="63" y1="28" x2="61" y2="35" stroke="#c8905a" stroke-width="1.8" stroke-linecap="round"/>

// ═══════════════════════════════════════
//  캔버스 & 리사이즈
// ═══════════════════════════════════════
const canvas=document.getElementById('gc');
const ctx=canvas.getContext('2d');
let W,H,GY;
function resize(){
  W=canvas.width=window.innerWidth;
  H=canvas.height=window.innerHeight;
  GY=Math.round(H*0.78);
}
resize();
window.addEventListener('resize',resize);

// ─── 상수 ───
const PW=()=>Math.round(W*0.055);
const PH=()=>Math.round(H*0.20);
const GRAVITY=0.55;
const JUMP_V=()=>-(H*0.040);
const LONGJUMP_V=()=>-(H*0.068);
const AWAKE_DUR=5;
const JUMP_THRESHOLD=150;

// ─── 게임 상태 ───
let gState='start';
let score=0,best=0,elapsed=0,awakeCnt=0;
let gauge=0,isAwake=false,awakeT=0;
let shield=false,shieldFlash=0,mult=1;
let px,py,pvy,onGround;
let obstacles=[],obsTimer=0,obsNext=2.5;
let powerups=[],puTimer=0,puNext=14;
let particles=[];
let bgScroll=0,shake=0;
let lastTs=null;
let pressT=0,pressing=false;
let bgObjects=[],clouds=[];

function spd(t){
  if(t<40) return 1.0+t*0.012;
  if(t<70) return 1.48+(t-40)*0.022;
  return Math.min(2.14+Math.pow(1.022,t-70)*0.55,9);
}

// ─── SVG 플레이어 크기/위치 ───
function updatePlayerSVG(){
  const pw=PW(), ph=PH();
  const wrap=document.getElementById('playerWrap');
  wrap.style.left=(px)+'px';
  wrap.style.top=(py)+'px';
  wrap.style.width=pw+'px';
  wrap.style.height=ph+'px';

  // 각성 상태 전환
  const charBody=document.getElementById('charBody');
  const auraLayer=document.getElementById('auraLayer');
  const eyeNormal=document.getElementById('eyeNormal');
  const eyeAwake=document.getElementById('eyeAwake');
  const crackLines=document.getElementById('crackLines');
  const tieFire=document.getElementById('tieFire');
  const hairBack=document.getElementById('hairBack');
  const faceBase=document.getElementById('faceBase');
  const blushL=document.getElementById('blushL');
  const blushR=document.getElementById('blushR');
  const speedLines=document.getElementById('speedLines');

  if(isAwake){
    charBody.style.animation='awake-body 0.32s ease-in-out infinite';
    auraLayer.setAttribute('opacity','1');
    eyeNormal.style.display='none';
    eyeAwake.setAttribute('display','block');
    crackLines.setAttribute('opacity','1');
    tieFire.setAttribute('opacity','1');
    faceBase.setAttribute('fill','#c88060');
    blushL.setAttribute('fill','rgba(200,0,100,0.28)');
    blushR.setAttribute('fill','rgba(200,0,100,0.28)');
    hairBack.setAttribute('fill','#0a0010');
    // 머리카락 모두 어둡게
    hairBack.querySelectorAll('ellipse,path').forEach(el=>el.setAttribute('fill','#0a0010'));
    speedLines.innerHTML=`
      <line x1="-24" y1="65" x2="-5" y2="65" stroke="rgba(255,45,85,0.5)" stroke-width="3" stroke-linecap="round"/>
      <line x1="-30" y1="80" x2="-7" y2="80" stroke="rgba(255,45,85,0.4)" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="-22" y1="95" x2="-5" y2="95" stroke="rgba(124,58,237,0.3)" stroke-width="2" stroke-linecap="round"/>
    `;
  } else {
    charBody.style.animation='run-body 0.42s ease-in-out infinite';
    auraLayer.setAttribute('opacity','0');
    eyeNormal.style.display='';
    eyeAwake.setAttribute('display','none');
    crackLines.setAttribute('opacity','0');
    tieFire.setAttribute('opacity','0');
    faceBase.setAttribute('fill','#f5c5a0');
    blushL.setAttribute('fill','rgba(255,120,100,0.22)');
    blushR.setAttribute('fill','rgba(255,120,100,0.22)');
    speedLines.innerHTML=`
      <line x1="-20" y1="68" x2="-5" y2="68" stroke="rgba(255,255,255,0.22)" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="-25" y1="82" x2="-7" y2="82" stroke="rgba(255,255,255,0.16)" stroke-width="2" stroke-linecap="round"/>
      <line x1="-18" y1="96" x2="-5" y2="96" stroke="rgba(255,255,255,0.10)" stroke-width="1.5" stroke-linecap="round"/>
    `;
  }
}

// ─── 초기화 ───
function initBg(){
  clouds=[];
  for(let i=0;i<6;i++) clouds.push({x:W*(0.1+i*0.18),y:H*(0.05+Math.random()*0.14),s:0.6+Math.random()*0.8});
  bgObjects=[];
  let bx=0;
  while(bx<W*3.5){
    const seg=Math.floor(bx/W)%3;
    const bw=W*(0.055+Math.random()*0.075);
    const bh=H*(0.18+Math.random()*0.30);
    bgObjects.push({x:bx,w:bw,h:bh,seg});
    bx+=bw+W*0.01;
  }
}

function reset(){
  score=0;elapsed=0;awakeCnt=0;
  gauge=0;isAwake=false;awakeT=0;
  shield=false;shieldFlash=0;mult=1;
  pressing=false;obstacles=[];powerups=[];particles=[];
  // SVG 장애물 제거
  document.querySelectorAll('.obsSVG,.puSVG').forEach(e=>e.remove());
  obsTimer=0;obsNext=2.5;puTimer=0;puNext=14;
  bgScroll=0;shake=0;lastTs=null;
  px=W*0.13; py=GY-PH(); pvy=0; onGround=true;
  initBg();
  document.getElementById('awakeOverlay').classList.remove('on');
  document.getElementById('awakeBar').style.display='none';
  document.getElementById('awakeText').classList.remove('pop');
  document.getElementById('shieldHUD').style.display='none';
  updatePlayerSVG();
}

// ─── 입력 ───
function requestFS(){
  const el=document.documentElement;
  try{ if(el.requestFullscreen) el.requestFullscreen({navigationUI:'hide'}); else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen(); }catch(e){}
  try{ if(screen.orientation&&screen.orientation.lock) screen.orientation.lock('landscape').catch(()=>{}); }catch(e){}
}

function inputDown(e){
  if(e.target.closest('.btn')) return;
  e.preventDefault();
  if(gState!=='playing') return;
  pressT=performance.now(); pressing=true;
  if(onGround){ pvy=JUMP_V(); onGround=false; spawnPtc(px+PW()/2,GY,'#ffffff',5); }
}
function inputUp(e){
  e.preventDefault();
  if(!pressing) return;
  const held=performance.now()-pressT; pressing=false;
  if(gState!=='playing') return;
  if(held>=JUMP_THRESHOLD&&pvy<0){ pvy=LONGJUMP_V(); spawnPtc(px+PW()/2,py+PH()/2,'#ffcc00',6); }
}

const gw=document.getElementById('gameWrapper');
gw.addEventListener('touchstart',inputDown,{passive:false});
gw.addEventListener('touchend',inputUp,{passive:false});
gw.addEventListener('mousedown',inputDown);
gw.addEventListener('mouseup',inputUp);
document.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();inputDown(e);}});
document.addEventListener('keyup',e=>{if(e.code==='Space'){e.preventDefault();inputUp(e);}});

function startGame(){ requestFS(); document.getElementById('startScreen').style.display='none'; reset(); gState='playing'; showHint(); }
function restartGame(){ requestFS(); document.getElementById('gameOverScreen').style.display='none'; reset(); gState='playing'; showHint(); }
function showHint(){ const h=document.getElementById('hint'); h.style.display='block'; setTimeout(()=>h.style.display='none',3000); }

function bindBtn(id,fn){
  const el=document.getElementById(id); let touched=false;
  el.addEventListener('touchstart',e=>{e.stopPropagation();e.preventDefault();touched=true;fn();},{passive:false});
  el.addEventListener('click',e=>{e.stopPropagation();if(touched){touched=false;return;}fn();});
}
bindBtn('startBtn',startGame);
bindBtn('restartBtn',restartGame);

// ─── 파티클 ───
function spawnPtc(x,y,col,n=8){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=(2+Math.random()*4)*(W/800);
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,life:1,decay:0.028+Math.random()*0.032,size:(3+Math.random()*6)*(W/800),col});
  }
}

// ─── 각성 ───
function triggerAwake(){
  isAwake=true;awakeT=AWAKE_DUR;awakeCnt++;gauge=0;mult=3;
  document.getElementById('awakeOverlay').classList.add('on');
  document.getElementById('awakeBar').style.display='block';
  const t=document.getElementById('awakeText');
  t.classList.remove('pop');void t.offsetWidth;t.classList.add('pop');
  shake=22; spawnPtc(px+PW()/2,py+PH()/2,'#ff2d55',22);
  obstacles=obstacles.filter(o=>{
    if(o._d<2){o._d=(o._d||0)+1;spawnPtc(o.x,GY-o.svgH/2,'#ff2d55',10);o.el&&o.el.remove();return false;}
    return true;
  });
  setTimeout(()=>document.getElementById('awakeText').classList.remove('pop'),1500);
}
function endAwake(){
  isAwake=false;mult=1;
  document.getElementById('awakeOverlay').classList.remove('on');
  document.getElementById('awakeBar').style.display='none';
}

// ─── 충돌 ───
function overlap(ax,ay,aw,ah,bx,by,bw,bh){return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;}

// ─── 장애물 SVG 생성 ───
function spawnObs(){
  const def=OBS_DEFS[Math.floor(Math.random()*OBS_DEFS.length)];
  const svgW=W*def.wr, svgH=H*def.hr;
  const el=document.createElement('div');
  el.className='obsSVG';
  el.innerHTML=def.svg;
  el.style.cssText=`width:${svgW}px;height:${svgH}px;left:${W+40}px;top:${GY-svgH}px;`;
  document.getElementById('svgLayer').appendChild(el);
  obstacles.push({x:W+40,w:svgW,h:svgH,svgH,el,_passed:false,_d:0});
}

function spawnPU(){
  const def=PU_DEFS[Math.random()<0.6?0:1];
  const svgW=W*def.w, svgH=H*def.h;
  const el=document.createElement('div');
  el.className='puSVG';
  el.innerHTML=def.svg;
  const yPos=GY-PH()-H*0.1;
  el.style.cssText=`width:${svgW}px;height:${svgH}px;left:${W+40}px;top:${yPos}px;`;
  document.getElementById('svgLayer').appendChild(el);
  powerups.push({x:W+40,y:yPos,w:svgW,h:svgH,el,type:def.id});
}

// ─── 게임오버 ───
function gameOver(){
  gState='dead';
  spawnPtc(px+PW()/2,py+PH()/2,'#ff4444',22);
  document.getElementById('fDist').textContent=Math.floor(score);
  document.getElementById('fBest').textContent=Math.floor(best);
  document.getElementById('fAwake').textContent=awakeCnt;
  document.getElementById('gameOverScreen').style.display='flex';
  endAwake();
}

// ─── 업데이트 ───
function update(ts){
  if(!lastTs) lastTs=ts;
  const dt=Math.min((ts-lastTs)/1000,0.05);
  lastTs=ts;
  if(gState!=='playing') return;
  elapsed+=dt;
  const s=spd(elapsed)*(isAwake?1.22:1);
  const pw=PW(),ph=PH();

  score+=s*dt*12*mult;
  if(score>best) best=score;

  if(!isAwake){
    gauge+=dt*1.1;
    if(gauge>=100) triggerAwake();
  } else {
    awakeT-=dt;
    document.getElementById('awakeBar').style.width=Math.max(0,awakeT/AWAKE_DUR*100)+'%';
    if(awakeT<=AWAKE_DUR-2&&awakeT>AWAKE_DUR-2-dt){
      obstacles=obstacles.filter(o=>{
        if(Math.abs(o.x-px)<W*0.22){spawnPtc(o.x,GY-o.h/2,'#7c3aed',10);o.el&&o.el.remove();return false;}
        return true;
      });
      shake=16;
    }
    if(awakeT<=0) endAwake();
  }

  pvy+=GRAVITY; py+=pvy;
  if(py>=GY-ph){py=GY-ph;pvy=0;onGround=true;}
  else onGround=false;

  bgScroll-=s*dt*60;
  clouds.forEach(c=>{c.x-=s*dt*22;if(c.x<-W*0.2) c.x=W+W*0.12;});

  obsTimer+=dt;
  if(obsTimer>=obsNext){obsTimer=0;spawnObs();obsNext=Math.max(0.75,1.5+Math.random()*1.2-elapsed*0.004);}

  const vx=s*dt*(W*0.26);
  obstacles=obstacles.filter(o=>{
    o.x-=vx;
    if(o.el) o.el.style.left=o.x+'px';
    if(o.x+o.w<0){o.el&&o.el.remove();return false;}
    const oy=GY-o.h,pad=pw*0.12;
    if(overlap(px+pad,py+pad,pw-pad*2,ph-pad*2,o.x,oy,o.w,o.h)){
      if(isAwake){spawnPtc(o.x+o.w/2,oy+o.h/2,'#ff2d55',12);score+=60;o.el&&o.el.remove();return false;}
      else if(shield){shield=false;shieldFlash=32;document.getElementById('shieldHUD').style.display='none';spawnPtc(o.x+o.w/2,oy+o.h/2,'#00bfff',12);shake=12;o.el&&o.el.remove();return false;}
      else{gameOver();return false;}
    }
    if(!o._passed&&o.x+o.w<px&&o.x+o.w>px-vx-5){o._passed=true;if(!isAwake) gauge=Math.min(gauge+5,99.5);}
    return true;
  });

  puTimer+=dt;
  if(puTimer>=puNext){puTimer=0;spawnPU();puNext=10+Math.random()*10;}
  powerups=powerups.filter(p=>{
    p.x-=vx;
    if(p.el) p.el.style.left=p.x+'px';
    if(p.x+p.w<0){p.el&&p.el.remove();return false;}
    if(overlap(px,py,pw,ph,p.x,p.y,p.w,p.h)){
      if(p.type==='energy'){ gauge=Math.min(gauge+35,99.5); spawnPtc(p.x+p.w/2,p.y+p.h/2,'#00f5ff',14); }
      else if(p.type==='shield'&&!shield){ shield=true; document.getElementById('shieldHUD').style.display='block'; spawnPtc(p.x+p.w/2,p.y+p.h/2,'#00bfff',10); }
      p.el&&p.el.remove();return false;
    }
    return true;
  });

  particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.18;p.life-=p.decay;return p.life>0;});
  if(shieldFlash>0) shieldFlash--;
  if(shake>0) shake--;

  document.getElementById('distD').textContent=Math.floor(score);
  document.getElementById('bestD').textContent=Math.floor(best);
  document.getElementById('gaugeFill').style.width=Math.min(gauge,100)+'%';

  // 플레이어 SVG 위치 업데이트
  updatePlayerSVG();
}

// ─── 배경 그리기 ───
function drawBg(){
  const sky=ctx.createLinearGradient(0,0,0,GY);
  if(isAwake){sky.addColorStop(0,'#0a0018');sky.addColorStop(1,'#1e0035');}
  else{sky.addColorStop(0,'#6888aa');sky.addColorStop(0.6,'#a0bcd4');sky.addColorStop(1,'#c4d8e8');}
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,GY);

  ctx.save();
  if(!isAwake){
    const sg=ctx.createRadialGradient(W*0.84,H*0.12,0,W*0.84,H*0.12,H*0.10);
    sg.addColorStop(0,'rgba(255,210,100,0.9)');sg.addColorStop(0.5,'rgba(255,180,60,0.35)');sg.addColorStop(1,'rgba(255,180,60,0)');
    ctx.fillStyle=sg;ctx.beginPath();ctx.arc(W*0.84,H*0.12,H*0.10,0,Math.PI*2);ctx.fill();
  } else {
    ctx.fillStyle='rgba(200,0,255,0.65)';ctx.beginPath();ctx.arc(W*0.84,H*0.10,H*0.05,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(120,0,200,0.35)';ctx.beginPath();ctx.arc(W*0.84,H*0.10,H*0.09,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();

  clouds.forEach(c=>{
    const r=W*0.048*c.s;
    ctx.fillStyle=isAwake?`rgba(80,0,120,0.4)`:`rgba(255,255,255,${0.55+c.s*0.18})`;
    ctx.beginPath();
    ctx.ellipse(c.x,c.y,r,r*0.42,0,0,Math.PI*2);
    ctx.ellipse(c.x+r*0.72,c.y-r*0.10,r*0.66,r*0.36,0,0,Math.PI*2);
    ctx.ellipse(c.x-r*0.58,c.y+r*0.06,r*0.50,r*0.28,0,0,Math.PI*2);
    ctx.ellipse(c.x+r*1.30,c.y+r*0.08,r*0.40,r*0.24,0,0,Math.PI*2);
    ctx.fill();
  });

  if(!isAwake){
    ctx.fillStyle='rgba(120,142,165,0.32)';
    ctx.beginPath();ctx.moveTo(0,GY*0.74);
    for(let x=0;x<=W;x+=W*0.055){
      const h=GY*0.74-Math.sin((x*0.003+bgScroll*0.00012))*GY*0.10-Math.sin((x*0.007+bgScroll*0.00018))*GY*0.055;
      ctx.lineTo(x,h);
    }
    ctx.lineTo(W,GY*0.74);ctx.lineTo(0,GY*0.74);ctx.closePath();ctx.fill();

    ctx.fillStyle='rgba(95,115,135,0.48)';
    ctx.beginPath();ctx.moveTo(0,GY*0.84);
    for(let x=0;x<=W;x+=W*0.04){
      const h=GY*0.84-Math.sin((x*0.005+bgScroll*0.00028))*GY*0.08-Math.sin((x*0.011+bgScroll*0.00038))*GY*0.038;
      ctx.lineTo(x,h);
    }
    ctx.lineTo(W,GY*0.84);ctx.lineTo(0,GY*0.84);ctx.closePath();ctx.fill();
  }

  const scroll=bgScroll*0.42;
  bgObjects.forEach(b=>{
    const bx=((b.x+scroll)%(W*3.5)+W*3.5)%(W*3.5)-W*0.2;
    if(bx>W+b.w||bx+b.w<-20) return;
    const by=GY-b.h;
    ctx.save();
    if(b.seg===0){
      ctx.fillStyle=isAwake?'#1c002e':'#787888';ctx.fillRect(bx,by,b.w,b.h);
      ctx.fillStyle=isAwake?'#120020':'#606072';
      ctx.fillRect(bx,by+b.h*0.33,b.w,2.5);ctx.fillRect(bx,by+b.h*0.66,b.w,2.5);
      ctx.fillStyle=isAwake?'#0a0016':'#525265';
      ctx.beginPath();ctx.moveTo(bx-b.w*0.04,by);ctx.lineTo(bx+b.w*0.5,by-b.h*0.13);ctx.lineTo(bx+b.w*1.04,by);ctx.closePath();ctx.fill();
      const wc=isAwake?'rgba(150,50,255,0.38)':'rgba(210,228,255,0.62)';
      const ww=b.w*0.20,wh=b.h*0.11,wgx=b.w*0.30,wgy=b.h*0.19;
      for(let wy=by+b.h*0.06;wy<GY-wh*1.5;wy+=wgy){
        for(let wx=bx+b.w*0.12;wx<bx+b.w-ww*1.2;wx+=wgx){
          ctx.fillStyle=wc;ctx.fillRect(wx,wy,ww,wh);
          ctx.strokeStyle=isAwake?'rgba(180,80,255,0.45)':'rgba(155,168,188,0.55)';
          ctx.lineWidth=1;ctx.strokeRect(wx,wy,ww,wh);
          if((wx+wy)%41<19&&!isAwake){ctx.fillStyle='rgba(255,220,120,0.42)';ctx.fillRect(wx+1,wy+1,ww-2,wh-2);}
        }
      }
    } else if(b.seg===1){
      ctx.fillStyle=isAwake?'#180025':'#585868';ctx.fillRect(bx,by,b.w,b.h);
      const signH=b.h*0.22;
      const isPC=(Math.floor(b.x/(W*0.4))%2===0);
      ctx.fillStyle=isPC?(isAwake?'rgba(255,0,255,0.85)':'rgba(0,180,255,0.9)'):(isAwake?'rgba(255,50,0,0.85)':'rgba(255,100,0,0.88)');
      ctx.fillRect(bx+b.w*0.04,by+b.h*0.04,b.w*0.92,signH);
      ctx.strokeStyle=isPC?'#00ffff':'#ffaa00';ctx.lineWidth=2;ctx.shadowColor=isPC?'#00ffff':'#ffaa00';ctx.shadowBlur=10;
      ctx.strokeRect(bx+b.w*0.04,by+b.h*0.04,b.w*0.92,signH);ctx.shadowBlur=0;
      ctx.fillStyle='#fff';ctx.font=`bold ${signH*0.48}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(isPC?'PC방':'분식',bx+b.w*0.5,by+b.h*0.04+signH*0.5);
      const ww2=b.w*0.20,wh2=b.h*0.12;
      for(let wy=by+b.h*0.34;wy<GY-b.h*0.08;wy+=b.h*0.20)
        for(let wx=bx+b.w*0.08;wx<bx+b.w-ww2*1.2;wx+=b.w*0.30){
          ctx.fillStyle=isAwake?'rgba(200,100,255,0.28)':'rgba(255,218,100,0.52)';ctx.fillRect(wx,wy,ww2,wh2);
        }
    } else {
      ctx.fillStyle=isAwake?'#160022':'#505060';ctx.fillRect(bx,by,b.w,b.h);
      const barW=Math.max(3,b.w*0.052),gap=b.w*0.12;
      for(let gx2=bx+gap*0.5;gx2<bx+b.w-barW;gx2+=gap){
        ctx.fillStyle=isAwake?'rgba(155,0,215,0.7)':'rgba(68,68,88,0.9)';ctx.fillRect(gx2,by,barW,b.h);
        ctx.fillStyle=isAwake?'rgba(175,0,250,0.38)':'rgba(88,88,108,0.65)';
        ctx.fillRect(bx,by+b.h*0.3,b.w,Math.max(2,b.h*0.022));
        ctx.fillRect(bx,by+b.h*0.6,b.w,Math.max(1.5,b.h*0.018));
      }
      ctx.fillStyle=isAwake?'rgba(215,0,95,0.9)':'rgba(48,48,68,0.95)';ctx.fillRect(bx,by,b.w,b.h*0.20);
      ctx.fillStyle=isAwake?'#ff99cc':'#c8c8d5';ctx.font=`bold ${b.h*0.12}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('🏫 ○○중학교',bx+b.w*0.5,by+b.h*0.10);
    }
    ctx.restore();
  });

  // 땅
  ctx.fillStyle=isAwake?'#18002e':'#646470';ctx.fillRect(0,GY,W,H-GY);
  ctx.fillStyle=isAwake?'#2c0048':'#868696';ctx.fillRect(0,GY,W,H*0.018);
  const tileW=W*0.065,tileH=H*0.036;
  const tileOff=((bgScroll*0.8)%(tileW+4));
  ctx.fillStyle=isAwake?'rgba(100,0,180,0.22)':'rgba(175,175,192,0.48)';
  for(let tx=-tileW+tileOff;tx<W+tileW;tx+=tileW+4) ctx.fillRect(tx,GY+H*0.022,tileW,tileH);
  ctx.fillStyle=isAwake?'rgba(120,0,200,0.28)':'rgba(138,138,158,0.58)';
  ctx.fillRect(0,GY+H*0.022+tileH,W,2);
}

function drawPtc(){
  particles.forEach(p=>{
    ctx.save();ctx.globalAlpha=p.life;ctx.fillStyle=p.col;
    ctx.beginPath();ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);ctx.fill();ctx.restore();
  });
}

function render(){
  ctx.save();
  if(shake>0) ctx.translate((Math.random()-0.5)*shake*0.4,(Math.random()-0.5)*shake*0.4);
  drawBg();
  drawPtc();
  ctx.restore();
}

function loop(ts){
  update(ts);
  render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
